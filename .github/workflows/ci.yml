name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-package:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Verify app-only package
        run: Tests/AppOnlyPackageTests.sh
      - name: Verify Context7 PreToolUse hook
        run: Tests/Context7PreToolUseHookTests.sh
      - name: Verify local development run workflow
        run: Tests/LocalDevelopmentRunTests.sh
      - name: Verify release version stamping
        run: Tests/ReleaseVersioningTests.sh
      - name: Run Swift tests
        run: swift test
      - name: Build local universal app
        run: VERSION=0.1.1 BUILD_NUMBER=2 Scripts/build-app.sh --unsigned
      - name: Verify release artifact
        run: EXPECTED_VERSION=0.1.1 EXPECTED_BUILD_NUMBER=2 Tests/ReleaseArtifactTests.sh
      - name: Test release tooling
        run: |
          Tests/NotarizationToolingTests.sh
          Tests/HomebrewCaskTests.sh
          Tests/PublishReleaseToolingTests.sh
          VERSION=0.1.1 \
          BUILD_NUMBER=2 \
          GITHUB_REPOSITORY=example/CodexChineseVoice \
          HOMEBREW_TAP_REPOSITORY=example/homebrew-tap \
          Scripts/release.sh --check-only
